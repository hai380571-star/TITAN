<div class="main-content">
    <h2>📦 Stock Summary</h2>
    <table border="1" class="styled-table">
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Current Stock</th>
                <th>Purchase Cost (Avg)</th>
                <th>Selling Price</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for item in inventory %}
            <tr>
                <td>{{ item['name'] }}</td>
                <td>{{ item['stock'] }}</td>
                <td>{{ item['cost'] if item['cost'] else 'N/A' }}</td>
                <td>{{ item['price'] }}</td>
                <td>
                    {% if item['stock'] <= 5 %}
                        <span style="color:red">Low Stock!</span>
                    {% else %}
                        <span style="color:green">Available</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
